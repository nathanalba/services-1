apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nathanalba/services-1
    targetRevision: MAIN
    path: apps
    directory:
      recurse: true        # picks up all subdirectories
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true          # deletes resources removed from git
      selfHeal: true       # reverts manual kubectl changes
